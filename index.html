<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habit Tracker</title>
<style>
  :root{
    --bg:#faf4ec;
    --ink:#4a72b0;
    --ink-strong:#3a5c92;
    --line:#c7d6ec;
    --line-strong:#4a72b0;
    --surface:#ffffff;
    --check:#4a72b0;
    --muted:#8fa6c9;
  }
  body.dark{
    --bg:#161a22;
    --ink:#8fb2e8;
    --ink-strong:#bcd4f7;
    --line:#2b3346;
    --line-strong:#5b83c4;
    --surface:#1d2330;
    --check:#8fb2e8;
    --muted:#5c6c8a;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink-strong);
    font-family:'Georgia', 'Times New Roman', serif;
    padding:30px 16px 60px;
    transition:background .25s ease, color .25s ease;
  }
  .sheet{
    max-width:1100px;
    margin:0 auto;
  }
  .topbar{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    margin-bottom:26px;
    gap:16px;
    flex-wrap:wrap;
  }
  h1{
    font-size:52px;
    line-height:0.95;
    font-weight:700;
    color:var(--ink);
    margin:0;
    letter-spacing:-0.01em;
  }
  .right-controls{
    display:flex;
    flex-direction:column;
    align-items:flex-end;
    gap:12px;
  }
  .mode-toggle{
    display:flex;
    align-items:center;
    gap:8px;
    font-family:Arial, sans-serif;
    font-size:11px;
    font-weight:600;
    color:var(--ink);
  }
  .mode-toggle button{
    border:1.5px solid var(--line-strong);
    background:transparent;
    color:var(--ink);
    padding:6px 12px;
    font-size:11px;
    font-weight:700;
    font-family:Arial, sans-serif;
    cursor:pointer;
    border-radius:20px;
    letter-spacing:.02em;
  }
  .mode-toggle button.active{
    background:var(--ink);
    color:var(--bg);
  }
  .date-box{
    text-align:right;
  }
  .date-box label{
    font-family:Arial, sans-serif;
    font-size:12px;
    font-weight:600;
    color:var(--ink);
    display:block;
    margin-bottom:4px;
  }
  .date-box .date-display{
    border:1.5px solid var(--line-strong);
    padding:8px 14px;
    font-family:Arial, sans-serif;
    font-size:13px;
    color:var(--ink-strong);
    min-width:170px;
  }
  .month-nav{
    border:none;
    background:transparent;
    color:var(--ink);
    font-size:16px;
    cursor:pointer;
    padding:0 4px;
    font-family:Arial, sans-serif;
  }
  .month-nav:hover{ color:var(--ink-strong); }
  .month-nav:disabled{ opacity:0.3; cursor:default; }
  .grid-wrap{
    overflow-x:auto;
    margin-bottom:30px;
  }
  table{
    border-collapse:collapse;
    width:100%;
  }
  thead th{
    font-family:Arial, sans-serif;
    font-size:11px;
    font-weight:600;
    color:var(--ink);
    border:1px solid var(--line);
    width:26px;
    height:26px;
    text-align:center;
  }
  thead th.today{
    background:var(--line);
    border-radius:3px;
  }
  thead th.label-col{ border:none; width:130px; }
  thead th.section-label{
    background:var(--line-strong);
    color:var(--bg);
    border:1px solid var(--line-strong);
    text-align:left;
    padding-left:10px;
    letter-spacing:.04em;
  }
  tbody td.label-cell{
    font-family:Arial, sans-serif;
    font-size:13px;
    font-weight:700;
    color:var(--ink);
    text-align:right;
    padding-right:16px;
    letter-spacing:.03em;
    white-space:nowrap;
  }
  tbody td.label-cell input{
    border:none;
    outline:none;
    background:transparent;
    font-family:Arial, sans-serif;
    font-size:13px;
    font-weight:700;
    color:var(--ink);
    text-align:right;
    width:100%;
    text-transform:uppercase;
    letter-spacing:.03em;
  }
  tbody td.cell{
    border:1px solid var(--line);
    height:32px;
    width:26px;
    text-align:center;
    cursor:pointer;
    font-family:Arial, sans-serif;
    font-size:14px;
    font-weight:700;
    color:var(--check);
    user-select:none;
  }
  tbody td.cell.today{
    background:rgba(74,114,176,0.06);
  }
  tbody td.cell.future{
    cursor:not-allowed;
    opacity:0.35;
  }
  .row-actions{
    display:flex;
    gap:8px;
    margin:-18px 0 30px;
    font-family:Arial, sans-serif;
  }
  .btn{
    border:1.2px solid var(--line-strong);
    background:transparent;
    color:var(--ink);
    padding:6px 12px;
    font-size:11px;
    font-weight:700;
    cursor:pointer;
    font-family:Arial, sans-serif;
    border-radius:4px;
  }
  .btn:hover{ background:var(--line); }
  .sleep-summary{
    font-family:Arial, sans-serif;
    font-size:12px;
    color:var(--ink);
    margin-top:8px;
  }
  .notes-box{
    border:1px solid var(--line-strong);
    padding:10px 14px 4px;
    font-family:Arial, sans-serif;
  }
  .notes-box .notes-title{
    font-size:12px;
    font-weight:700;
    color:var(--ink);
    letter-spacing:.03em;
    margin-bottom:8px;
  }
  .notes-box input{
    display:block;
    width:100%;
    border:none;
    border-bottom:1px solid var(--line);
    outline:none;
    background:transparent;
    font-family:Arial, sans-serif;
    font-size:13px;
    color:var(--ink-strong);
    padding:8px 0;
    margin-bottom:2px;
  }
  .footer{
    margin-top:24px;
    padding-top:16px;
    border-top:1px solid var(--line);
    display:flex;
    justify-content:flex-end;
    align-items:center;
    gap:18px;
    font-family:Arial, sans-serif;
  }
  .footer a{
    display:flex;
    align-items:center;
    gap:6px;
    font-size:12px;
    font-weight:600;
    color:var(--ink);
    text-decoration:none;
    border:1px solid var(--line-strong);
    padding:6px 12px;
    border-radius:20px;
  }
  .footer a:hover{ background:var(--line); }
  .status{
    text-align:center;
    font-family:Arial, sans-serif;
    font-size:10px;
    color:var(--muted);
    margin-top:16px;
  }
  tbody tr.habit-row{
    cursor:grab;
  }
  .auth-overlay{
    position:fixed;
    inset:0;
    background:var(--bg);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:100;
    font-family:Arial, sans-serif;
  }
  .auth-card{
    background:var(--surface);
    border:1.5px solid var(--line-strong);
    border-radius:8px;
    padding:32px 28px;
    width:270px;
  }
  .auth-card h2{
    margin:0 0 18px;
    color:var(--ink);
    font-family:'Georgia', serif;
    font-size:26px;
  }
  .auth-card input{
    display:block;
    width:100%;
    margin-bottom:10px;
    padding:9px 10px;
    border:1px solid var(--line-strong);
    border-radius:4px;
    background:transparent;
    color:var(--ink-strong);
    font-family:Arial, sans-serif;
    font-size:13px;
    outline:none;
  }
  .auth-submit{
    width:100%;
    background:var(--ink);
    color:var(--bg);
    border:none;
    padding:10px;
    border-radius:4px;
    font-weight:700;
    cursor:pointer;
    margin-top:4px;
    font-family:Arial, sans-serif;
    font-size:13px;
  }
  .auth-submit:disabled{ opacity:0.6; cursor:default; }
  .auth-switch{
    font-size:12px;
    margin-top:16px;
    color:var(--muted);
    text-align:center;
  }
  .auth-switch a{ color:var(--ink); cursor:pointer; text-decoration:underline; }
  .auth-error{
    color:#c0392b;
    font-size:12px;
    margin-bottom:10px;
    min-height:14px;
  }
  .logout-btn{
    border:1px solid var(--line-strong);
    background:transparent;
    color:var(--ink);
    font-size:11px;
    font-weight:700;
    padding:6px 12px;
    border-radius:20px;
    cursor:pointer;
    font-family:Arial, sans-serif;
  }
  .logout-btn:hover{ background:var(--line); }
  tbody tr.habit-row.dragging{
    opacity:0.4;
  }
  tbody tr.habit-row.drag-over td{
    border-top:2px solid var(--ink);
  }
  .context-menu{
    position:fixed;
    z-index:50;
    background:var(--surface);
    border:1px solid var(--line-strong);
    border-radius:6px;
    box-shadow:0 4px 14px rgba(0,0,0,0.25);
    padding:4px;
    font-family:Arial, sans-serif;
    font-size:12px;
  }
  .context-menu button{
    display:block;
    width:100%;
    text-align:left;
    border:none;
    background:transparent;
    color:#c0392b;
    padding:7px 14px;
    cursor:pointer;
    font-family:Arial, sans-serif;
    font-size:12px;
    font-weight:600;
    border-radius:4px;
    white-space:nowrap;
  }
  .context-menu button:hover{ background:var(--line); }
  .undo-toast{
    position:fixed;
    bottom:24px;
    left:50%;
    transform:translateX(-50%);
    background:var(--ink-strong);
    color:var(--bg);
    padding:10px 16px;
    border-radius:8px;
    font-family:Arial, sans-serif;
    font-size:12px;
    display:flex;
    align-items:center;
    gap:14px;
    z-index:60;
    box-shadow:0 4px 14px rgba(0,0,0,0.3);
  }
  .undo-toast button{
    border:1px solid var(--bg);
    background:transparent;
    color:var(--bg);
    padding:4px 10px;
    border-radius:14px;
    font-weight:700;
    font-size:11px;
    cursor:pointer;
    font-family:Arial, sans-serif;
  }
  @media (max-width:640px){
    h1{ font-size:38px; }
    .topbar{ flex-direction:column; }
    .right-controls{ align-items:flex-start; }
    .date-box{ text-align:left; }
  }
</style>
</head>
<body>

<div id="authOverlay" class="auth-overlay">
  <div class="auth-card">
    <h2 id="authTitle">Log in</h2>
    <div class="auth-error" id="authError"></div>
    <input id="authUsername" placeholder="Username" autocomplete="username">
    <input id="authPassword" type="password" placeholder="Password" autocomplete="current-password">
    <p style="font-size:11px;color:var(--muted);margin:-4px 0 10px;">Username: 3+ characters. Password: 6+ characters with letters and numbers.</p>
    <button class="auth-submit" id="authSubmit">Log in</button>
    <p class="auth-switch">Don't have an account? <a id="authSwitchLink">Sign up</a></p>
  </div>
</div>

<div class="sheet" id="appSheet" style="display:none">
  <div class="topbar">
    <h1>habit<br>tracker</h1>
    <div class="right-controls">
      <div class="mode-toggle">
        <button id="lightBtn">LIGHT</button>
        <button id="darkBtn">DARK</button>
        <button id="logoutBtn" class="logout-btn">LOG OUT</button>
      </div>
      <div class="date-box">
        <label>MONTH</label>
        <div class="date-display" id="monthDisplay" style="display:flex;align-items:center;justify-content:space-between;gap:10px">
          <button id="prevMonth" class="month-nav">‹</button>
          <span id="monthLabel"></span>
          <button id="nextMonth" class="month-nav">›</button>
        </div>
      </div>
    </div>
  </div>

  <div class="grid-wrap">
    <table id="habitsTable">
      <thead><tr id="habitsHead"><th class="label-col section-label">HABITS / DAYS</th></tr></thead>
      <tbody id="habitsBody"></tbody>
    </table>
  </div>
  <div class="row-actions">
    <button class="btn" id="addHabit">+ Add habit</button>
  </div>

  <div class="grid-wrap">
    <table id="sleepTable">
      <thead><tr id="sleepHead"><th class="label-col section-label">SLEEP</th></tr></thead>
      <tbody id="sleepBody"></tbody>
    </table>
  </div>
  <div class="sleep-summary" id="sleepSummary">Average sleep this month: —</div>

  <div class="notes-box">
    <div class="notes-title">NOTES :</div>
    <input data-note="0" placeholder="">
    <input data-note="1" placeholder="">
  </div>

  <div class="footer">
    <a id="igLink" href="https://www.instagram.com/niloy.39/" target="_blank" rel="noopener">Instagram</a>
    <a id="xLink" href="https://x.com/niloy_39" target="_blank" rel="noopener">X</a>
  </div>

  <div class="status" id="status">Loading…</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
  signOut, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, doc, getDoc, setDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB8787NWs9vv5ZgMvXEWRHXlB8hwZGi17s",
  authDomain: "habit-tracker-62d96.firebaseapp.com",
  projectId: "habit-tracker-62d96",
  storageBucket: "habit-tracker-62d96.firebasestorage.app",
  messagingSenderId: "60248818274",
  appId: "1:60248818274:web:c59e0e1fadd593965d873b"
};
const fbApp = initializeApp(firebaseConfig);
const auth = getAuth(fbApp);
const db = getFirestore(fbApp);
let currentUid = null;

function usernameToEmail(username){
  return username.trim().toLowerCase().replace(/\s+/g, "") + "@habittracker.local";
}
function friendlyAuthError(err){
  const code = err.code || "";
  if(code.includes("email-already-in-use")) return "That username is already taken.";
  if(code.includes("weak-password")) return "Password must be at least 6 characters.";
  if(code.includes("invalid-credential") || code.includes("wrong-password") || code.includes("user-not-found")) return "Incorrect username or password.";
  if(code.includes("invalid-email")) return "Please enter a valid username (letters/numbers only).";
  return "Something went wrong. Please try again.";
}

let authMode = "login";
function setAuthMode(mode){
  authMode = mode;
  document.getElementById("authTitle").textContent = mode === "login" ? "Log in" : "Sign up";
  document.getElementById("authSubmit").textContent = mode === "login" ? "Log in" : "Create account";
  document.querySelector(".auth-switch").innerHTML = mode === "login"
    ? 'Don\'t have an account? <a id="authSwitchLink">Sign up</a>'
    : 'Already have an account? <a id="authSwitchLink">Log in</a>';
  document.getElementById("authSwitchLink").addEventListener("click", () => {
    setAuthMode(mode === "login" ? "signup" : "login");
  });
  document.getElementById("authError").textContent = "";
}
document.getElementById("authSwitchLink").addEventListener("click", () => setAuthMode("signup"));

document.getElementById("authSubmit").addEventListener("click", async () => {
  const username = document.getElementById("authUsername").value.trim();
  const password = document.getElementById("authPassword").value;
  const errorEl = document.getElementById("authError");
  errorEl.textContent = "";
  if(!username || !password){
    errorEl.textContent = "Please fill in both fields.";
    return;
  }
  if(authMode === "signup"){
    if(username.length < 3){
      errorEl.textContent = "Username must be at least 3 characters.";
      return;
    }
    if(!/^[a-zA-Z0-9_]+$/.test(username)){
      errorEl.textContent = "Username can only contain letters, numbers, and underscores.";
      return;
    }
    if(password.length < 6){
      errorEl.textContent = "Password must be at least 6 characters.";
      return;
    }
    const hasLetter = /[a-zA-Z]/.test(password);
    const hasNumber = /[0-9]/.test(password);
    if(!hasLetter || !hasNumber){
      errorEl.textContent = "Password must include both letters and numbers.";
      return;
    }
  }
  const submitBtn = document.getElementById("authSubmit");
  submitBtn.disabled = true;
  const email = usernameToEmail(username);
  try{
    if(authMode === "signup"){
      const cred = await createUserWithEmailAndPassword(auth, email, password);
      await setDoc(doc(db, "users", cred.user.uid), {
        habitLabels: ["Diet","Water","Workout 1","Workout 2","Book","Study"],
        monthsData: {},
        theme: "dark"
      });
    } else {
      await signInWithEmailAndPassword(auth, email, password);
    }
  }catch(err){
    errorEl.textContent = friendlyAuthError(err);
  }
  submitBtn.disabled = false;
});

document.getElementById("logoutBtn").addEventListener("click", () => signOut(auth));

onAuthStateChanged(auth, async (user) => {
  if(user){
    currentUid = user.uid;
    document.getElementById("authOverlay").style.display = "none";
    document.getElementById("appSheet").style.display = "block";
    document.getElementById("authUsername").value = "";
    document.getElementById("authPassword").value = "";
    await loadFromFirestore();
  } else {
    currentUid = null;
    document.getElementById("authOverlay").style.display = "flex";
    document.getElementById("appSheet").style.display = "none";
  }
});

const REAL_TODAY = new Date();
const MONTH_NAMES = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const SLEEP_LABELS = ["9 hrs","8 hrs","7 hrs","6 hrs","5 hrs"];
const SLEEP_VALUES = [9,8,7,6,5];

let habitLabels = ["Diet","Water","Workout 1","Workout 2","Book","Study"];
let theme = "dark";
let monthsData = {}; // keyed by "YYYY-M" -> { habitMarks:[[...]], sleepMarks:[[...]], notes:["",""] }
let viewDate = new Date(REAL_TODAY.getFullYear(), REAL_TODAY.getMonth(), 1);

function monthKey(d){ return d.getFullYear() + "-" + (d.getMonth()+1); }
function daysIn(d){ return new Date(d.getFullYear(), d.getMonth()+1, 0).getDate(); }
function isRealCurrentMonth(d){ return monthKey(d) === monthKey(REAL_TODAY); }

function getMonthData(d){
  const key = monthKey(d);
  const n = daysIn(d);
  if(!monthsData[key]) monthsData[key] = { habitMarks:[], sleepMarks:[], notes:["",""] };
  const md = monthsData[key];
  habitLabels.forEach((_, i) => {
    if(!md.habitMarks[i] || md.habitMarks[i].length !== n) md.habitMarks[i] = Array(n).fill(false);
  });
  for(let i=0;i<SLEEP_LABELS.length;i++){
    if(!md.sleepMarks[i] || md.sleepMarks[i].length !== n) md.sleepMarks[i] = Array(n).fill(false);
  }
  if(!md.notes) md.notes = ["",""];
  return md;
}

function buildHead(rowId, count, todayDate){
  const row = document.getElementById(rowId);
  row.querySelectorAll("th.day-th").forEach(th => th.remove());
  for(let d=1; d<=count; d++){
    const th = document.createElement("th");
    th.textContent = d;
    th.className = "day-th";
    if(d === todayDate) th.classList.add("today");
    row.appendChild(th);
  }
}

function renderMonthLabel(){
  document.getElementById("monthLabel").textContent = MONTH_NAMES[viewDate.getMonth()] + " " + viewDate.getFullYear();
  document.getElementById("nextMonth").disabled = isRealCurrentMonth(viewDate);
}

function renderHabits(){
  const n = daysIn(viewDate);
  const todayDate = isRealCurrentMonth(viewDate) ? REAL_TODAY.getDate() : -1;
  buildHead("habitsHead", n, todayDate);
  const md = getMonthData(viewDate);
  const body = document.getElementById("habitsBody");
  body.innerHTML = "";
  habitLabels.forEach((label, hi) => {
    const tr = document.createElement("tr");
    tr.className = "habit-row";
    tr.draggable = true;
    tr.dataset.index = hi;

    tr.addEventListener("dragstart", e => {
      tr.classList.add("dragging");
      e.dataTransfer.setData("text/plain", hi);
    });
    tr.addEventListener("dragend", () => tr.classList.remove("dragging"));
    tr.addEventListener("dragover", e => { e.preventDefault(); tr.classList.add("drag-over"); });
    tr.addEventListener("dragleave", () => tr.classList.remove("drag-over"));
    tr.addEventListener("drop", e => {
      e.preventDefault();
      tr.classList.remove("drag-over");
      const fromIndex = +e.dataTransfer.getData("text/plain");
      const toIndex = +tr.dataset.index;
      if(fromIndex === toIndex) return;
      reorderHabit(fromIndex, toIndex);
    });
    tr.addEventListener("contextmenu", e => {
      e.preventDefault();
      showContextMenu(e.clientX, e.clientY, hi);
    });

    const labelTd = document.createElement("td");
    labelTd.className = "label-cell";
    const input = document.createElement("input");
    input.value = label;
    input.addEventListener("input", e => { habitLabels[hi] = e.target.value; save(); });
    labelTd.appendChild(input);
    tr.appendChild(labelTd);

    for(let d=0; d<n; d++){
      const isFuture = todayDate !== -1 && (d+1) > todayDate;
      const td = document.createElement("td");
      td.className = "cell" + (d+1 === todayDate ? " today" : "") + (isFuture ? " future" : "");
      td.textContent = md.habitMarks[hi][d] ? "✓" : "";
      if(!isFuture){
        td.addEventListener("click", () => {
          md.habitMarks[hi][d] = !md.habitMarks[hi][d];
          td.textContent = md.habitMarks[hi][d] ? "✓" : "";
          save();
        });
      }
      tr.appendChild(td);
    }
    body.appendChild(tr);
  });
}

function reorderHabit(fromIndex, toIndex){
  const [movedLabel] = habitLabels.splice(fromIndex, 1);
  habitLabels.splice(toIndex, 0, movedLabel);
  Object.values(monthsData).forEach(md => {
    if(md.habitMarks && md.habitMarks[fromIndex]){
      const [movedMarks] = md.habitMarks.splice(fromIndex, 1);
      md.habitMarks.splice(toIndex, 0, movedMarks);
    }
  });
  renderHabits();
  save();
}

let contextMenuEl = null;
function closeContextMenu(){
  if(contextMenuEl){ contextMenuEl.remove(); contextMenuEl = null; }
}
function showContextMenu(x, y, hi){
  closeContextMenu();
  const menu = document.createElement("div");
  menu.className = "context-menu";
  menu.style.left = x + "px";
  menu.style.top = y + "px";
  const delBtn = document.createElement("button");
  delBtn.textContent = "Delete habit";
  delBtn.addEventListener("click", () => {
    deleteHabit(hi);
    closeContextMenu();
  });
  menu.appendChild(delBtn);
  document.body.appendChild(menu);
  contextMenuEl = menu;
}
document.addEventListener("click", closeContextMenu);

let undoTimer = null;
let undoData = null;
function deleteHabit(hi){
  undoData = {
    index: hi,
    label: habitLabels[hi],
    marksByMonth: {}
  };
  Object.keys(monthsData).forEach(key => {
    const md = monthsData[key];
    if(md.habitMarks && md.habitMarks[hi]){
      undoData.marksByMonth[key] = md.habitMarks[hi];
    }
  });

  habitLabels.splice(hi, 1);
  Object.values(monthsData).forEach(md => {
    if(md.habitMarks) md.habitMarks.splice(hi, 1);
  });
  renderHabits();
  save();
  showUndoToast();
}

function showUndoToast(){
  removeUndoToast();
  const toast = document.createElement("div");
  toast.className = "undo-toast";
  toast.id = "undoToast";
  const label = document.createElement("span");
  label.textContent = "Habit deleted";
  const btn = document.createElement("button");
  btn.textContent = "Undo";
  btn.addEventListener("click", undoDelete);
  toast.appendChild(label);
  toast.appendChild(btn);
  document.body.appendChild(toast);
  undoTimer = setTimeout(removeUndoToast, 10000);
}
function removeUndoToast(){
  clearTimeout(undoTimer);
  const el = document.getElementById("undoToast");
  if(el) el.remove();
}
function undoDelete(){
  if(!undoData) return;
  habitLabels.splice(undoData.index, 0, undoData.label);
  Object.keys(undoData.marksByMonth).forEach(key => {
    if(monthsData[key] && monthsData[key].habitMarks){
      monthsData[key].habitMarks.splice(undoData.index, 0, undoData.marksByMonth[key]);
    }
  });
  undoData = null;
  removeUndoToast();
  renderHabits();
  save();
}

function renderSleep(){
  const n = daysIn(viewDate);
  const todayDate = isRealCurrentMonth(viewDate) ? REAL_TODAY.getDate() : -1;
  buildHead("sleepHead", n, todayDate);
  const md = getMonthData(viewDate);
  const body = document.getElementById("sleepBody");
  body.innerHTML = "";
  SLEEP_LABELS.forEach((label, si) => {
    const tr = document.createElement("tr");
    const labelTd = document.createElement("td");
    labelTd.className = "label-cell";
    labelTd.textContent = label;
    tr.appendChild(labelTd);

    for(let d=0; d<n; d++){
      const isFuture = todayDate !== -1 && (d+1) > todayDate;
      const td = document.createElement("td");
      td.className = "cell" + (d+1 === todayDate ? " today" : "") + (isFuture ? " future" : "");
      td.textContent = md.sleepMarks[si][d] ? "✓" : "";
      if(!isFuture){
        td.addEventListener("click", () => {
          SLEEP_LABELS.forEach((_, oi) => { if(oi !== si) md.sleepMarks[oi][d] = false; });
          md.sleepMarks[si][d] = !md.sleepMarks[si][d];
          renderSleep();
          save();
        });
      }
      tr.appendChild(td);
    }
    body.appendChild(tr);
  });
  updateSleepSummary(md, n);
}

function updateSleepSummary(md, n){
  let total = 0, count = 0;
  for(let d=0; d<n; d++){
    for(let si=0; si<SLEEP_LABELS.length; si++){
      if(md.sleepMarks[si][d]){ total += SLEEP_VALUES[si]; count++; break; }
    }
  }
  const el = document.getElementById("sleepSummary");
  el.textContent = count > 0
    ? "Average sleep this month: " + (total/count).toFixed(1) + " hrs (" + count + " day" + (count>1?"s":"") + " logged)"
    : "Average sleep this month: —";
}

function renderNotes(){
  const md = getMonthData(viewDate);
  document.querySelectorAll(".notes-box input").forEach(inp => {
    inp.value = md.notes[+inp.dataset.note] || "";
  });
}

function renderAll(){
  renderMonthLabel();
  renderHabits();
  renderSleep();
  renderNotes();
}

document.getElementById("addHabit").addEventListener("click", () => {
  habitLabels.push("New habit");
  renderHabits(); save();
});
document.querySelectorAll(".notes-box input").forEach(inp => {
  inp.addEventListener("input", e => {
    const md = getMonthData(viewDate);
    md.notes[+e.target.dataset.note] = e.target.value;
    save();
  });
});
document.getElementById("prevMonth").addEventListener("click", () => {
  viewDate = new Date(viewDate.getFullYear(), viewDate.getMonth()-1, 1);
  renderAll();
});
document.getElementById("nextMonth").addEventListener("click", () => {
  if(isRealCurrentMonth(viewDate)) return;
  viewDate = new Date(viewDate.getFullYear(), viewDate.getMonth()+1, 1);
  renderAll();
});

function applyTheme(){
  document.body.classList.toggle("dark", theme === "dark");
  document.getElementById("darkBtn").classList.toggle("active", theme === "dark");
  document.getElementById("lightBtn").classList.toggle("active", theme === "light");
}
document.getElementById("lightBtn").addEventListener("click", () => { theme = "light"; applyTheme(); save(); });
document.getElementById("darkBtn").addEventListener("click", () => { theme = "dark"; applyTheme(); save(); });

let saveTimer = null;
function save(){
  const statusEl = document.getElementById("status");
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    if(!currentUid) return;
    try{
      statusEl.textContent = "Saving…";
      await setDoc(doc(db, "users", currentUid), { habitLabels, monthsData, theme });
      statusEl.textContent = "Saved";
    }catch(err){
      statusEl.textContent = "Save failed";
    }
  }, 400);
}

async function loadFromFirestore(){
  const statusEl = document.getElementById("status");
  statusEl.textContent = "Loading…";
  try{
    const snap = await getDoc(doc(db, "users", currentUid));
    if(snap.exists()){
      const data = snap.data();
      if(data.habitLabels) habitLabels = data.habitLabels;
      if(data.monthsData) monthsData = data.monthsData;
      if(data.theme) theme = data.theme;
    }
    statusEl.textContent = "Ready";
  }catch(err){
    statusEl.textContent = "Load failed";
  }
  applyTheme();
  renderAll();
}
</script>
